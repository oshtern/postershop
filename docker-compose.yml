services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postershop
      POSTGRES_PASSWORD: postershop
      POSTGRES_DB: postershop
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./backend/db:/docker-entrypoint-initdb.d
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postershop:postershop@db:5432/postershop
      SESSION_SECRET: changeme
      FRONTEND_ORIGIN: http://localhost:4000
    depends_on:
      - db
volumes:
  dbdata:
